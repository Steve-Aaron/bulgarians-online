<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="1200" height="420">
  <defs>
    <linearGradient id="flagGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"      stop-color="#FFFFFF"/>
      <stop offset="33.33%" stop-color="#FFFFFF"/>
      <stop offset="33.33%" stop-color="#00966E"/>
      <stop offset="66.66%" stop-color="#00966E"/>
      <stop offset="66.66%" stop-color="#D62612"/>
      <stop offset="100%"   stop-color="#D62612"/>
    </linearGradient>
    <linearGradient id="overlayGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="rgba(15,0,50,0.80)"/>
      <stop offset="100%" stop-color="rgba(192,24,42,0.60)"/>
    </linearGradient>
    <radialGradient id="figGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <filter id="softBlur" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="clay">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feOffset dx="0" dy="4" result="offset"/>
      <feComposite in="SourceGraphic" in2="offset" operator="over"/>
    </filter>
  </defs>

  <!-- Flag background -->
  <rect width="1200" height="420" fill="url(#flagGrad)"/>

  <!-- Dark overlay -->
  <rect width="1200" height="420" fill="url(#overlayGrad)" opacity="0.9"/>

  <!-- Speckle texture dots -->
  <circle cx="87"  cy="48"  r="2.5" fill="rgba(255,255,255,0.09)"/>
  <circle cx="213" cy="112" r="1.8" fill="rgba(255,255,255,0.07)"/>
  <circle cx="356" cy="32"  r="3"   fill="rgba(255,255,255,0.06)"/>
  <circle cx="489" cy="88"  r="2"   fill="rgba(255,255,255,0.08)"/>
  <circle cx="634" cy="55"  r="1.5" fill="rgba(255,255,255,0.1)"/>
  <circle cx="780" cy="97"  r="2.8" fill="rgba(255,255,255,0.07)"/>
  <circle cx="920" cy="42"  r="2"   fill="rgba(255,255,255,0.09)"/>
  <circle cx="1068" cy="78" r="3.2" fill="rgba(255,255,255,0.06)"/>
  <circle cx="145" cy="340" r="2"   fill="rgba(255,255,255,0.07)"/>
  <circle cx="299" cy="380" r="2.5" fill="rgba(255,255,255,0.09)"/>
  <circle cx="502" cy="355" r="1.8" fill="rgba(255,255,255,0.08)"/>
  <circle cx="688" cy="390" r="3"   fill="rgba(255,255,255,0.06)"/>
  <circle cx="847" cy="360" r="2"   fill="rgba(255,255,255,0.1)"/>
  <circle cx="1010" cy="385" r="2.5" fill="rgba(255,255,255,0.07)"/>

  <!-- Clay figures — groups of rounded people shapes -->

  <!-- Figure 1 (far left) -->
  <g transform="translate(100, 140)" filter="url(#clay)">
    <ellipse cx="0" cy="180" rx="38" ry="28" fill="rgba(0,0,0,0.25)"/>
    <rect x="-22" y="80" width="44" height="100" rx="22" fill="#C0182A"/>
    <rect x="-22" y="80" width="44" height="100" rx="22" fill="url(#figGlow)"/>
    <circle cx="0" cy="60" r="36" fill="#F4C8A0"/>
    <circle cx="0" cy="60" r="36" fill="url(#figGlow)" opacity="0.4"/>
  </g>

  <!-- Figure 2 -->
  <g transform="translate(220, 110)" filter="url(#clay)">
    <ellipse cx="0" cy="200" rx="38" ry="24" fill="rgba(0,0,0,0.22)"/>
    <rect x="-24" y="90" width="48" height="110" rx="24" fill="#00966E"/>
    <rect x="-24" y="90" width="48" height="110" rx="24" fill="url(#figGlow)"/>
    <circle cx="0" cy="68" r="38" fill="#E8B090"/>
    <circle cx="0" cy="68" r="38" fill="url(#figGlow)" opacity="0.4"/>
  </g>

  <!-- Figure 3 (taller) -->
  <g transform="translate(355, 90)" filter="url(#clay)">
    <ellipse cx="0" cy="220" rx="42" ry="26" fill="rgba(0,0,0,0.25)"/>
    <rect x="-26" y="95" width="52" height="125" rx="26" fill="#2D4EA0"/>
    <rect x="-26" y="95" width="52" height="125" rx="26" fill="url(#figGlow)"/>
    <circle cx="0" cy="72" r="40" fill="#F0C898"/>
    <circle cx="0" cy="72" r="40" fill="url(#figGlow)" opacity="0.35"/>
  </g>

  <!-- Figure 4 (centre-left) -->
  <g transform="translate(500, 120)" filter="url(#clay)">
    <ellipse cx="0" cy="185" rx="36" ry="22" fill="rgba(0,0,0,0.22)"/>
    <rect x="-22" y="82" width="44" height="103" rx="22" fill="#9B7FFF"/>
    <rect x="-22" y="82" width="44" height="103" rx="22" fill="url(#figGlow)"/>
    <circle cx="0" cy="60" r="36" fill="#EEC88E"/>
    <circle cx="0" cy="60" r="36" fill="url(#figGlow)" opacity="0.4"/>
  </g>

  <!-- Figure 5 (centre, slightly raised) -->
  <g transform="translate(640, 80)" filter="url(#clay)">
    <ellipse cx="0" cy="230" rx="44" ry="28" fill="rgba(0,0,0,0.26)"/>
    <rect x="-28" y="100" width="56" height="130" rx="28" fill="#D62612"/>
    <rect x="-28" y="100" width="56" height="130" rx="28" fill="url(#figGlow)"/>
    <circle cx="0" cy="76" r="42" fill="#F4C090"/>
    <circle cx="0" cy="76" r="42" fill="url(#figGlow)" opacity="0.38"/>
  </g>

  <!-- Figure 6 -->
  <g transform="translate(780, 115)" filter="url(#clay)">
    <ellipse cx="0" cy="192" rx="38" ry="24" fill="rgba(0,0,0,0.22)"/>
    <rect x="-23" y="86" width="46" height="106" rx="23" fill="#00966E"/>
    <rect x="-23" y="86" width="46" height="106" rx="23" fill="url(#figGlow)"/>
    <circle cx="0" cy="63" r="38" fill="#E8A880"/>
    <circle cx="0" cy="63" r="38" fill="url(#figGlow)" opacity="0.4"/>
  </g>

  <!-- Figure 7 -->
  <g transform="translate(915, 100)" filter="url(#clay)">
    <ellipse cx="0" cy="210" rx="40" ry="25" fill="rgba(0,0,0,0.24)"/>
    <rect x="-25" y="90" width="50" height="120" rx="25" fill="#C0182A"/>
    <rect x="-25" y="90" width="50" height="120" rx="25" fill="url(#figGlow)"/>
    <circle cx="0" cy="68" r="38" fill="#F0BCA0"/>
    <circle cx="0" cy="68" r="38" fill="url(#figGlow)" opacity="0.38"/>
  </g>

  <!-- Figure 8 (far right) -->
  <g transform="translate(1060, 130)" filter="url(#clay)">
    <ellipse cx="0" cy="178" rx="36" ry="22" fill="rgba(0,0,0,0.22)"/>
    <rect x="-22" y="80" width="44" height="98" rx="22" fill="#2D4EA0"/>
    <rect x="-22" y="80" width="44" height="98" rx="22" fill="url(#figGlow)"/>
    <circle cx="0" cy="58" r="36" fill="#F4C8A8"/>
    <circle cx="0" cy="58" r="36" fill="url(#figGlow)" opacity="0.4"/>
  </g>

  <!-- Subtle ground shadow strip -->
  <rect y="340" width="1200" height="80" fill="rgba(0,0,0,0.18)"/>

  <!-- Top fade -->
  <rect width="1200" height="60" fill="url(#topFade)"/>
  <defs>
    <linearGradient id="topFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="rgba(10,0,40,0.4)"/>
      <stop offset="100%" stop-color="rgba(10,0,40,0)"/>
    </linearGradient>
  </defs>
</svg>
